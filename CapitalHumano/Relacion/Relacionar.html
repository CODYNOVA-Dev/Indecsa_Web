<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>INDECSA – Relacionar personal</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>

    *{margin:0;padding:0;box-sizing:border-box;}

    :root{
      --navy:#0B1F3A;
      --navy-mid:#152D50;
      --navy-dark:#0a1828;
      --gold:#C8A96E;
      --white:#F8F9FC;
      --muted:#8A9BB5;
      --border:rgba(200,169,110,0.18);
      --success:#5DCAA5;
      --warning:#FAC775;
      --purple:#AFA9EC;
      --danger:#F09595;
      --blue:#6FA8FF;
    }

    body{
      font-family:'DM Sans',sans-serif;
      background:var(--navy);
      color:var(--white);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      padding-top:120px;
    }

    header{
      background:var(--navy-mid);
      border-bottom:1px solid var(--border);
      height:72px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 2rem;
      position:fixed;
      top:0;left:0;right:0;
    }

    .header-tag{
      font-size:11px;
      color:var(--muted);
      letter-spacing:1.5px;
      text-transform:uppercase;
    }

    nav{
      background:var(--navy-dark);
      border-bottom:1px solid rgba(200,169,110,0.12);
      height:48px;
      display:flex;
      align-items:center;
      padding:0 2rem;
      gap:8px;
      position:fixed;
      top:72px;left:0;right:0;
    }

    .nav-link{
      color:var(--muted);
      text-decoration:none;
      font-size:13px;
      padding:6px 14px;
      border-radius:6px;
      display:flex;
      align-items:center;
      gap:6px;
    }

    .nav-link:hover,.nav-link.active{
      background:rgba(200,169,110,0.1);
      color:var(--gold);
    }

    .nav-sep{flex:1;}

    .nav-logout{
      display:flex;
      align-items:center;
      gap:7px;
      padding:6px 16px;
      border-radius:6px;
      font-size:13px;
      color:var(--danger);
      cursor:pointer;
      border:1px solid rgba(226,75,74,0.25);
      background:none;
    }

    main{
      flex:1;
      padding:2.5rem 2rem;
      background:radial-gradient(ellipse at 70% 30%,#1a2e4a 0%,var(--navy) 70%);
    }

    .page-wrap{
      max-width:900px;
      margin:auto;
    }

    .page-title{
      font-family:'Playfair Display',serif;
      font-size:24px;
      margin-bottom:20px;
    }

    .toolbar{
      display:flex;
      gap:12px;
      margin-bottom:20px;
    }

    .filter-select{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(200,169,110,0.2);
      border-radius:9px;
      color:white;
      font-size:13px;
      padding:8px 10px;
    }

    .cards-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .proj-card{
      background:var(--navy-mid);
      border:1px solid rgba(200,169,110,0.15);
      border-radius:13px;
      padding:16px;
      cursor:pointer;
      position:relative;
      transition:.25s;
      opacity:0;
      transform:translateY(10px);
      animation:fadeUp .4s ease forwards;
    }

    .proj-card:hover{
      border-color:rgba(200,169,110,0.4);
      background:#1a3560;
      transform:translateY(-4px);
      box-shadow:0 10px 25px rgba(0,0,0,0.25);
    }

    @keyframes fadeUp{
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* 🔥 línea superior */

    .proj-card::before{
      content:'';
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:3px;
      border-radius:13px 13px 0 0;
    }

    .c-en_curso::before{background:linear-gradient(90deg,transparent,var(--success),transparent);}
    .c-finalizado::before{background:linear-gradient(90deg,transparent,var(--purple),transparent);}
    .c-pausado::before{background:linear-gradient(90deg,transparent,var(--warning),transparent);}
    .c-planeacion::before{background:linear-gradient(90deg,transparent,var(--blue),transparent);}
    .c-cancelado::before{background:linear-gradient(90deg,transparent,var(--danger),transparent);}

    .proj-name{
      font-size:15px;
      font-weight:500;
      margin-bottom:6px;
    }

    .wrow{
      font-size:12px;
      color:var(--muted);
      margin-bottom:5px;
      display:flex;
      align-items:center;
      gap:6px;
    }

    .wrow i{
      color:var(--gold);
      font-size:11px;
    }

    .status-badge{
      position:absolute;
      top:12px;
      right:12px;
      font-size:9px;
      padding:4px 9px;
      border-radius:20px;
      text-transform:uppercase;
    }

    .s-en_curso{background:rgba(93,202,165,0.12);color:var(--success);border:1px solid rgba(93,202,165,0.3);}
    .s-finalizado{background:rgba(175,169,236,0.12);color:var(--purple);border:1px solid rgba(175,169,236,0.3);}
    .s-pausado{background:rgba(250,199,117,0.12);color:var(--warning);border:1px solid rgba(250,199,117,0.3);}
    .s-planeacion{background:rgba(111,168,255,0.12);color:var(--blue);border:1px solid rgba(111,168,255,0.3);}
    .s-cancelado{background:rgba(240,149,149,0.12);color:var(--danger);border:1px solid rgba(240,149,149,0.3);}

    footer{
      background:var(--navy-mid);
      border-top:1px solid var(--border);
      height:56px;
      display:flex;
      align-items:center;
      padding:0 2rem;
    }

    .footer-left{
      font-size:12px;
      color:var(--muted);
    }

  </style>
</head>

<body>

<header>
  <img src="../../img/logo.png" height="50">
  <div class="header-tag">Capital Humano</div>
</header>

<nav>
  <a class="nav-link" href="../Paginaprincipal.html"><i class="fa-solid fa-house"></i> Inicio</a>
  <a class="nav-link" href="../Trabajador/VisualizarTrabajadores.html"><i class="fa-solid fa-user"></i> Trabajadores</a>
  <a class="nav-link" href="../Proyecto/ListaProyectos.html"><i class="fa-solid fa-diagram-project"></i> Proyectos</a>
  <a class="nav-link" href="../Contratista/ListaContratistas.html">
    <i class="fa-solid fa-people-group"></i> Contratistas
  </a>
  <a class="nav-link active"><i class="fa-solid fa-link"></i> Relacionar</a>
  <div class="nav-sep"></div>
  <button class="nav-logout" onclick="cerrarSesion()"><i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión</button>
</nav>

<main>
  <div class="page-wrap">

    <h2 class="page-title">Relacionar personal con proyectos</h2>

    <div class="toolbar">
      <input id="busqueda" class="filter-select" placeholder="Buscar proyecto..." oninput="filtrar()">

      <select id="filtroEstatus" class="filter-select" onchange="filtrar()">
        <option value="">Todos</option>
        <option value="PLANEACION">Planeación</option>
        <option value="EN_CURSO">En curso</option>
        <option value="PAUSADO">Pausado</option>
        <option value="FINALIZADO">Finalizado</option>
        <option value="CANCELADO">Cancelado</option>
      </select>

      <select id="filtroEstado" class="filter-select" onchange="filtrar()">
        <option value="">Todos</option>
        <option value="CDMX">CDMX</option>
        <option value="Hidalgo">Hidalgo</option>
        <option value="Puebla">Puebla</option>
      </select>
    </div>

    <div class="cards-grid" id="cardsGrid"></div>

  </div>
</main>

<footer>
  <div class="footer-left">© 2026 INDECSA</div>
</footer>

<script>

  const API = "http://localhost:8080/api/v1/proyectos";
  let proyectos = [];

  async function cargarProyectos(){
    const res = await fetch(API);
    const data = await res.json();

    proyectos = data.map(p => ({
      id: p.idProyecto,
      nombre: p.nombreProyecto,
      estado: p.estadoProyectoGeo,
      municipio: p.municipioProyecto || "N/A",
      estatus: p.estatusProyecto,
      trabajadores: 0
    }));


    for (let p of proyectos) {

      // trabajadores
      const resTrab = await fetch(`http://localhost:8080/api/v1/asignaciones/trabajador-proyecto/proyecto/${p.id}`);
      const trabs = await resTrab.json();
      p.trabajadores = trabs.length;

      // contratista
      const resCont = await fetch(`http://localhost:8080/api/v1/asignaciones/proyecto-contratista/proyecto/${p.id}`);
      const conts = await resCont.json();

      const activo = conts.find(c => c.estatusContrato === "ACTIVO");
      p.contratista = activo ? activo.contratista.nombreContratista : "Sin asignar";
    }

    filtrar();

  }

  function render(p){
    return `
  <div class="proj-card c-${p.estatus.toLowerCase()}" onclick="abrirProyecto(${p.id})">

    <div class="proj-name">${p.nombre}</div>

    <div class="wrow"><i class="fa-solid fa-location-dot"></i>${p.estado}</div>
    <div class="wrow"><i class="fa-solid fa-map-pin"></i>${p.municipio}</div>
    <div class="wrow"><i class="fa-solid fa-users"></i>${p.trabajadores}/8 trabajadores</div>
    <div class="wrow"><i class="fa-solid fa-people-group"></i>${p.contratista}</div>

    <div class="status-badge s-${p.estatus.toLowerCase()}">
      ${p.estatus.replace("_"," ")}
    </div>

  </div>`;
  }

  function filtrar(){
    const estado = document.getElementById("filtroEstado").value;
    const estatus = document.getElementById("filtroEstatus").value;
    const busqueda = document.getElementById("busqueda").value.toLowerCase();

    const f = proyectos.filter(p =>
      (!estado || p.estado === estado) &&
      (!estatus || p.estatus === estatus) &&
      p.nombre.toLowerCase().includes(busqueda)
    );

    document.getElementById("cardsGrid").innerHTML = f.map(render).join("");
  }

  function abrirProyecto(id){
    window.location = "FichaRelacion.html?id=" + id;
  }

  function cerrarSesion(){
    window.location.href='../../index.html';
  }

  cargarProyectos();

</script>

</body>
</html>
