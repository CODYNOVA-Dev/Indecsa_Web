  <style>

    :root{
      --navy:#0B1F3A;
      --navy-mid:#152D50;
      --navy-dark:#0a1828;
      --gold:#C8A96E;
      --white:#F8F9FC;

      --success:#5DCAA5;
      --danger:#F09595;
      --border:rgba(200,169,110,0.18);

    body{
      font-family:'DM Sans',sans-serif;
      background:var(--navy);
      color:var(--white);
      padding-top:120px;
      display:flex;              /* ← agrega */
  flex-direction:column;     /* ← agrega */
  min-height:100vh;
    }

    /* HEADER */
    header{
      background:var(--navy-mid);
      border-bottom:1px solid var(--border);
      height:72px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 2rem;
      position:fixed;
      top:0; left:0; right:0;
    }

    .header-tag{
      font-size:11px;
      color:var(--muted);
      letter-spacing:1.5px;
      text-transform:uppercase;
    }

    /* NAV */
    nav{
      background:var(--navy-dark);
      border-bottom:1px solid rgba(200,169,110,0.12);
      height:48px;
      display:flex;
      align-items:center;
      padding:0 2rem;
      gap:8px;
      position:fixed;
      top:72px; left:0; right:0;
    }

    .nav-link{
      color:var(--muted);
      text-decoration:none;
      font-size:13px;
      padding:6px 14px;
      border-radius:6px;
      display:flex;
      align-items:center;
      gap:6px;
    }

    .nav-link:hover,.nav-link.active{
      background:rgba(200,169,110,0.1);
      color:var(--gold);
    }

    .nav-sep{flex:1;}

    main{ padding:40px;
       flex:1;
}

    .page-wrap{
      max-width:850px;
      margin:auto;

    }

    .page-title{
      font-family:'Playfair Display',serif;
      font-size:24px;
      margin-bottom:20px;
    }

    .card{
      background:var(--navy-mid);
      border:1px solid var(--border);
      border-radius:12px;
      padding:20px;
      margin-bottom:18px;
    }



    label{
      font-size:13px;
      color:var(--muted);
      display:block;
      margin-bottom:6px;
    }

    select{
      width:100%;
      padding:9px;
      border-radius:8px;
      border:1px solid var(--border);
      background:#0f2747;
      color:white;
      margin-bottom:10px;
    }

    button{
      padding:8px 16px;
      border-radius:8px;
      border:none;
      cursor:pointer;
      font-weight:600;
    }

    .btn-add{
      background:var(--success);
      color:#0B1F3A;
    }

    .btn-del{
      background:var(--danger);
      color:white;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
    }

    th,td{
      padding:10px;
      border-bottom:1px solid rgba(255,255,255,0.08);
      font-size:13px;
    }

    th{
      color:var(--gold);
      text-align:left;
    }

    /* FOOTER */
    footer{
      background:var(--navy-mid);
      border-top:1px solid var(--border);
      margin-top:40px;
    }

    .footer-content{
      max-width:700px;
      margin:auto;
      display:flex;
      justify-content:space-between;
      padding:18px 10px;
      font-size:12px;
      color:var(--muted);
    }
    .btn-volver{
  margin-top:20px;
  padding:8px 18px;
  border-radius:8px;
  border:1px solid rgba(200,169,110,0.3);
  color:var(--gold);       /* ← agrega */
  color:var(--gold);
  cursor:pointer;
  font-size:13px;
}

.btn-volver:hover{
  background:rgba(200,169,110,0.1);
}

  </style>
</head>

<body>

<header>
  <img src="../../img/logo.png" height="52">
  <div class="header-tag">Capital Humano</div>
</header>

<nav>
  <a class="nav-link" href="../Paginaprincipal.html"><i class="fa-solid fa-house"></i> Inicio</a>
  <a class="nav-link" href="../Trabajador/VisualizarTrabajadores.html"><i class="fa-solid fa-user"></i> Trabajadores</a>
  <a class="nav-link" href="../Proyecto/ListaProyectos.html"><i class="fa-solid fa-diagram-project"></i> Proyectos</a>
  <a class="nav-link" href="../Contratista/ListaContratistas.html">
    <i class="fa-solid fa-people-group"></i> Contratistas
  </a>
  <a class="nav-link active"><i class="fa-solid fa-link"></i> Relacionar</a>
  <a class="nav-link" href="../RegistroHoras/RegistroHoras.html"><i class="fa-solid fa-clock"></i> Reg. Horas</a>
  <a class="nav-link" href="../PersonalObra/PersonalObra.html"><i class="fa-solid fa-hard-hat"></i> Personal Obra</a>
  <a class="nav-link" href="../AvanceObra/AvanceObra.html"><i class="fa-solid fa-chart-line"></i> Avance Obra</a>
  <a class="nav-link" href="../Reportes/Reportes.html"><i class="fa-solid fa-file-pdf"></i> Reportes</a>
  <div class="nav-sep"></div>
</nav>

<main>

  <div class="page-wrap">

    <h2 class="page-title">Asignación de personal</h2>

    <div class="card">

      <label>Asignar contratista</label>

      <select id="contratistaSelect"></select>

      <button id="btnAsignarCont" class="btn-add" onclick="asignarContratista()">
        Asignar contratista
      </button>

      <button id="btnEliminarCont" class="btn-del" style="display:none;" onclick="eliminarContratista()">
        Eliminar contratista
      </button>

      <label> </label>



      <label> Agregar trabajador</label>

      <div style="margin:10px 0; font-size:13px; color:#8A9BB5;">
        Trabajadores asignados: <span id="contador">0 / 8</span>
      </div>

      <select id="trabajadorSelect"></select>

      <button class="btn-add" onclick="agregarTrabajador()">
        Agregar trabajador
      </button>

      <table>
        <thead>
        <tr>
          <th>Trabajador</th>
          <th>Especialidad</th>
          <th>Acción</th>
        </tr>
        </thead>

        <tbody id="tablaTrabajadores"></tbody>

      </table>

      <!-- 🔥 BOTÓN BIEN PUESTO -->
      <label> </label>
      <button class="btn-add" onclick="guardarTodo()">
        Guardar cambios
      </button>

      <label> </label>
      <button class="btn-add" onclick="volver()" style="margin-top:15px;">
        Volver
      </button>

    </div>

  </div>

</main>

<footer>
  <div class="footer-content">
    <div><b>INDECSA</b><br>Sistema de gestión de personal</div>
    <div>Contacto<br>soporte@indecsa.com</div>
    <div>© 2026 INDECSA</div>
  </div>
</footer>

<!-- SOLO TE PONGO SCRIPT + CAMBIOS CLAVE, LO DEMÁS QUEDA IGUAL -->



<script>

  const API_TRAB = "http://localhost:8080/api/v1/trabajadores";
  const API_PROY = "http://localhost:8080/api/v1/proyectos";
  const API_ASIG = "http://localhost:8080/api/v1/asignaciones/trabajador-proyecto";
  const API_CONTRATISTAS = "http://localhost:8080/api/v1/contratistas";
  const API_PC = "http://localhost:8080/api/v1/asignaciones/proyecto-contratista";

  let trabajadores = [];
  let contratistas = [];
  let asignados = [];
  let proyecto = null;
  let contratoActivo = null;

  const params = new URLSearchParams(window.location.search);
  const idProyecto = params.get("id");

  async function init(){
    await cargarProyecto();
    await cargarContratoProyecto(); // 🔥 primero esto
    await cargarContratistas();
    await cargarTrabajadores();
    await cargarAsignados();

    renderSelects();
    renderTabla();
    actualizarUIContrato(); // 🔥 ahora sí detecta desde inicio
  }

  /* ================== CARGAS ================== */

  async function cargarProyecto(){
    const res = await fetch(`${API_PROY}/${idProyecto}`);
    proyecto = await res.json();
  }

  async function cargarContratoProyecto(){
    const res = await fetch(`${API_PC}/proyecto/${idProyecto}`);
    const data = await res.json();

    contratoActivo = data.find(c => c.estatusContrato === "ACTIVO") || null;
  }

  async function cargarContratistas(){
    const res = await fetch(API_CONTRATISTAS);
    const data = await res.json();

    contratistas = data.filter(c =>
      c.estadoContratista === "ACTIVO" &&
      c.ubicacionContratista?.toUpperCase() === proyecto.estadoProyectoGeo?.toUpperCase()
    );
  }

  async function cargarTrabajadores(){
    const res = await fetch(API_TRAB);
    const data = await res.json();

    trabajadores = data
      .filter(t =>
        t.estadoTrabajador === "ACTIVO" &&
        t.ubicacionTrabajador?.toUpperCase() === proyecto.estadoProyectoGeo?.toUpperCase()
      )
      .sort((a,b)=> a.especialidadTrabajador.localeCompare(b.especialidadTrabajador));
  }

  async function cargarAsignados(){
    const res = await fetch(`${API_ASIG}/proyecto/${idProyecto}`);
    asignados = await res.json();
  }

  /* ================== UI ================== */

  function renderSelects(){

    const selectTrab = document.getElementById("trabajadorSelect");
    const selectCont = document.getElementById("contratistaSelect");

    selectCont.innerHTML = contratistas.length === 0
      ? `<option>No hay contratistas disponibles</option>`
      : contratistas.map(c => `
      <option value="${c.idContratista}">
        ${c.nombreContratista} – ${c.ubicacionContratista}
      </option>
    `).join("");

    selectTrab.innerHTML = trabajadores.length === 0
      ? `<option>No hay trabajadores disponibles</option>`
      : trabajadores.map(t => `
      <option value="${t.idTrabajador}">
        ${t.especialidadTrabajador} – ${t.nombreTrabajador}
      </option>
    `).join("");
  }

  function renderTabla(){

    const tbody = document.getElementById("tablaTrabajadores");
    const contador = document.getElementById("contador");
    const btnAgregar = document.querySelector("button[onclick='agregarTrabajador()']");

    contador.innerText = `${asignados.length} / 8`;

    if(asignados.length === 0){
      tbody.innerHTML = `<tr><td colspan="3">Sin trabajadores asignados</td></tr>`;
    } else {
      tbody.innerHTML = asignados.map(a => `
      <tr>
        <td>${a.trabajador.nombreTrabajador}</td>
        <td>${a.trabajador.especialidadTrabajador}</td>
        <td>
          <button class="btn-del" onclick="eliminar(${a.idAsignacionTp})">
            Eliminar
          </button>
        </td>
      </tr>
    `).join("");
    }

    if(asignados.length >= 8){
      btnAgregar.disabled = true;
      btnAgregar.innerText = "Límite alcanzado (8)";
      btnAgregar.style.background = "#999";
    } else {
      btnAgregar.disabled = false;
      btnAgregar.innerText = "Agregar trabajador";
      btnAgregar.style.background = "#5DCAA5";
    }
  }

  /* ================== CONTRATISTA ================== */

  function actualizarUIContrato(){

    const btnAsignar = document.getElementById("btnAsignarCont");
    const btnEliminar = document.getElementById("btnEliminarCont");

    if(contratoActivo){
      btnAsignar.style.display = "none";
      btnEliminar.style.display = "inline-block";
    } else {
      btnAsignar.style.display = "inline-block";
      btnEliminar.style.display = "none";
    }
  }

  async function asignarContratista(){

    if(contratoActivo){
      alert("Este proyecto ya tiene contratista ");
      return;
    }

    const idCont = parseInt(document.getElementById("contratistaSelect").value);

    const res = await fetch(API_PC,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        idProyecto: parseInt(idProyecto),
        idContratista: idCont,
        estatusContrato: "ACTIVO"
      })
    });

    if(!res.ok){
      alert("Error al asignar contratista ");
      return;
    }

    await cargarContratoProyecto();
    actualizarUIContrato();

    alert("Contratista asignado ");
  }

  async function eliminarContratista(){

    if(!confirm("¿Eliminar contratista del proyecto?")) return;

    await fetch(`${API_PC}/${contratoActivo.idAsignacionPc}`,{
      method:"DELETE"
    });

    contratoActivo = null;

    await cargarContratoProyecto();
    actualizarUIContrato();

    alert("Contratista eliminado 🗑");
  }

  /* ================== TRABAJADORES ================== */

  async function agregarTrabajador(){

    if(!contratoActivo){
      alert("Primero asigna un contratista ");
      return;
    }

    const idTrab = parseInt(document.getElementById("trabajadorSelect").value);

    if(asignados.some(a => a.trabajador.idTrabajador === idTrab)){
      alert("Ese trabajador ya está asignado ");
      return;
    }

    if(asignados.length >= 8){
      alert("Máximo 8 trabajadores ");
      return;
    }

    const res = await fetch(API_ASIG,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        idTrabajador: idTrab,
        idProyecto: parseInt(idProyecto),
        idAsignacionPc: contratoActivo.idAsignacionPc,
        rolEnProyecto: "Operativo"
      })
    });

    if(!res.ok){
      alert("Error al agregar trabajador ");
      return;
    }

    await cargarAsignados();
    renderTabla();
  }

  async function eliminar(id){

    if(!confirm("¿Eliminar trabajador?")) return;

    await fetch(`${API_ASIG}/${id}`,{ method:"DELETE" });

    await cargarAsignados();
    renderTabla();
  }

  function guardarTodo(){
    alert("Guardado exitoso");
  }

  init();

  function volver(){
    if(document.referrer){
      window.history.back();
    } else {
      window.location.href = "../Proyecto/ListaProyectos.html";
    }
  }

</script>

</body>
</html>
