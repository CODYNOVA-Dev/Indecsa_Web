<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle del trabajador</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>

    :root{
      --navy:#0B1F3A;
      --navy-mid:#152D50;
      --gold:#C8A96E;
      --muted:#8A9BB5;
      --border:rgba(200,169,110,0.18);
      --success:#5DCAA5;
      --danger:#F09595;
      --warning:#F4D35E;
    }

    body{
      font-family:'DM Sans',sans-serif;
      background:var(--navy);
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
    }

    .detalle-card{
      background:var(--navy-mid);
      border:1px solid var(--border);
      border-radius:14px;
      padding:30px;
      width:420px;
      text-align:center;
      position:relative;
    }

    .detalle-card::before{
      content:'';
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:4px;
      border-radius:14px 14px 0 0;
    }

    .c-activo::before{ background:#5DCAA5; }
    .c-inactivo::before{ background:#F09595; }
    .c-vacaciones::before{ background:#F4D35E; }
    .c-baja::before{ background:#999; }

    .avatar{
      width:70px;
      height:70px;
      border-radius:50%;
      background:rgba(200,169,110,0.15);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      margin:auto;
      margin-bottom:15px;
    }

    .nombre{
      font-family:'Playfair Display',serif;
      font-size:22px;
      margin-bottom:10px;
    }

    .row{
      display:flex;
      justify-content:center;
      gap:8px;
      margin:6px 0;
      color:var(--muted);
      flex-wrap:wrap;
    }

    .row i{ color:var(--gold); }

    .stars i{ color:gold; }

    button{
      margin-top:18px;
      padding:8px 18px;
      border-radius:8px;
      border:none;
      background:var(--gold);
      cursor:pointer;
    }

  </style>
</head>

<body>

<div class="detalle-card" id="card">

  <div class="avatar" id="avatar"></div>

  <div class="nombre" id="nombre"></div>

  <div class="row">
    <i class="fa-solid fa-helmet-safety"></i>
    <span id="especialidad"></span>
  </div>

  <div class="row">
    <i class="fa-solid fa-phone"></i>
    <span id="telefono"></span>
  </div>

  <div class="row">
    <i class="fa-solid fa-envelope"></i>
    <span id="correo"></span>
  </div>

  <div class="row">
    <i class="fa-solid fa-location-dot"></i>
    <span id="ubicacion"></span>
  </div>

  <div class="row stars" id="estrellas"></div>

  <div class="row">
    <i class="fa-solid fa-calendar"></i>
    <span id="fecha"></span>
  </div>

  <div class="row">
    <i class="fa-solid fa-align-left"></i>
    <span id="descripcion"></span>
  </div>

  <div class="row">
    <strong id="estado"></strong>
  </div>

  <button onclick="volver()">Volver</button>

</div>

<script>

  function getId(){
    const params = new URLSearchParams(window.location.search);
    return params.get("id");
  }

  function iniciales(n){
    const p=n.split(" ");
    return p[0][0]+(p[1]?p[1][0]:"");
  }

  function estrellas(n){
    let s="";
    for(let i=1;i<=5;i++){
      s+=`<i class="fa-star ${i<=n?'fa-solid':'fa-regular'}"></i>`;
    }
    return s;
  }

  async function cargar(){

    const id = getId();

    const res = await fetch(`http://localhost:8080/api/v1/trabajadores/${id}`);
    const t = await res.json();

    document.getElementById("avatar").innerText = iniciales(t.nombreTrabajador);
    document.getElementById("nombre").innerText = t.nombreTrabajador;
    document.getElementById("especialidad").innerText = t.especialidadTrabajador;
    document.getElementById("telefono").innerText = t.telefonoTrabajador;
    document.getElementById("correo").innerText = t.correoTrabajador;
    document.getElementById("ubicacion").innerText = t.ubicacionTrabajador;
    document.getElementById("fecha").innerText = t.fechaIngreso;
    document.getElementById("descripcion").innerText = t.descripcionTrabajador || "Sin descripción";
    document.getElementById("estado").innerText = t.estadoTrabajador;

    document.getElementById("estrellas").innerHTML = estrellas(t.calificacionTrabajador || 0);

    // color dinámico
    const card = document.getElementById("card");
    card.classList.add("c-" + t.estadoTrabajador.toLowerCase());

  }

  function volver(){
    window.history.back();
  }

  cargar();

</script>

</body>
</html>
