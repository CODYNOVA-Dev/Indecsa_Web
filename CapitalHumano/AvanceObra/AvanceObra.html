<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INDECSA – Avance de Obra</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy: #0B1F3A; --navy-mid: #152D50; --navy-dark: #0a1828;
      --navy-card: #1a2e4a; --gold: #C8A96E; --white: #F8F9FC;
      --muted: #8A9BB5; --success: #4CAF82; --danger: #E24B4A;
      --warning: #F0A500; --blue: #4A90D9; --border: rgba(200,169,110,0.18);
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--white); padding-top: 120px; min-height: 100vh; }

    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--navy-mid); border-bottom: 1px solid var(--border);
      padding: 0 2rem; height: 72px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo img { height: 38px; }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gold); letter-spacing: 1px; }
    .header-tag { font-size: 11px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }

    nav {
      position: fixed; top: 72px; left: 0; right: 0; z-index: 99;
      background: var(--navy-dark); border-bottom: 1px solid rgba(200,169,110,0.12);
      display: flex; align-items: center; padding: 0 2rem; height: 48px; gap: 4px;
      transition: transform 0.25s ease;
    }
    body.nav-hidden nav { transform: translateY(-48px); }
    .nav-link {
      display: flex; align-items: center; gap: 7px; padding: 6px 12px;
      border-radius: 6px; font-size: 13px; color: var(--muted); text-decoration: none;
      transition: background 0.15s, color 0.15s; white-space: nowrap;
    }
    .nav-link:hover, .nav-link.active { background: rgba(200,169,110,0.1); color: var(--gold); }
    .nav-sep { flex: 1; }
    .nav-logout {
      display: flex; align-items: center; gap: 7px; padding: 6px 14px;
      border-radius: 6px; font-size: 13px; color: #F09595; cursor: pointer;
      border: 1px solid rgba(226,75,74,0.25); background: none;
      font-family: 'DM Sans', sans-serif; transition: background 0.2s;
    }
    .nav-logout:hover { background: rgba(226,75,74,0.1); }

    main { padding: 2rem; max-width: 1400px; margin: 0 auto; }

    .page-header { margin-bottom: 1.75rem; }
    .page-icon { font-size: 28px; color: var(--gold); margin-bottom: 8px; }
    .page-header h1 { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--white); margin-bottom: 4px; }
    .page-header p { font-size: 13px; color: var(--muted); }

    .layout { display: grid; grid-template-columns: 420px 1fr; gap: 1.5rem; align-items: start; }

    .form-panel {
      background: var(--navy-mid); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.5rem; position: sticky; top: 136px;
    }
    .panel-title {
      font-size: 13px; font-weight: 500; color: var(--gold);
      letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: 8px;
    }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; letter-spacing: 0.3px; }
    select, input[type="text"], input[type="date"], input[type="number"], textarea {
      width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 12px; color: var(--white);
      font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none;
      transition: border-color 0.2s;
    }
    select:focus, input:focus, textarea:focus { border-color: var(--gold); }
    select option { background: var(--navy-mid); }
    select:disabled { opacity: 0.5; cursor: not-allowed; }
    textarea { resize: vertical; min-height: 72px; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn-submit {
      width: 100%; padding: 11px; border-radius: 8px; border: none;
      background: linear-gradient(135deg, var(--gold), #a88540);
      color: #0a1828; font-family: 'DM Sans', sans-serif; font-size: 13px;
      font-weight: 600; cursor: pointer; margin-top: 4px;
      transition: opacity 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-submit:not(:disabled):hover { opacity: 0.88; }

    .records-panel { min-width: 0; }
    .filter-bar {
      background: var(--navy-mid); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem 1.25rem;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .filter-bar label { color: var(--muted); font-size: 12px; white-space: nowrap; margin-bottom: 0; }
    .filter-bar input { width: 148px; }
    .btn-filter, .btn-clear {
      padding: 8px 16px; border-radius: 7px; font-size: 12px; font-weight: 500;
      cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s;
    }
    .btn-filter { background: var(--gold); color: #0a1828; }
    .btn-filter:hover { opacity: 0.85; }
    .btn-clear { background: rgba(255,255,255,0.07); color: var(--muted); border: 1px solid var(--border); }
    .btn-clear:hover { background: rgba(255,255,255,0.12); }

    .records-list { display: flex; flex-direction: column; gap: 10px; }

    .sk { border-radius: 8px; background: linear-gradient(90deg,#1e3050 25%,#254060 50%,#1e3050 75%); background-size:200% 100%; animation: pulse 1.4s ease infinite; }
    .sk-line { height: 14px; margin-bottom: 8px; }
    @keyframes pulse { 0%,100%{background-position:200% 0} 50%{background-position:-200% 0} }
    .sk-card { background: var(--navy-mid); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }

    .avance-card {
      background: var(--navy-mid); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.25rem;
      transition: border-color 0.2s;
    }
    .avance-card:hover { border-color: rgba(200,169,110,0.35); }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .card-partida { font-size: 15px; font-weight: 500; color: var(--white); line-height: 1.3; }
    .card-date { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .card-qty { font-size: 22px; font-weight: 500; color: var(--gold); margin-bottom: 6px; }
    .card-qty span { font-size: 13px; color: var(--muted); font-weight: 400; margin-left: 4px; }
    .prog-wrap { margin-bottom: 10px; }
    .prog-bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; margin-bottom: 4px; }
    .prog-bar-fill { height: 100%; background: var(--success); border-radius: 99px; transition: width 0.6s ease; }
    .prog-bar-fill.over { background: var(--warning); }
    .prog-label { font-size: 11px; color: var(--muted); }
    .card-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .chip { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 99px; font-size: 11px; font-weight: 500; }
    .chip-cuadrilla { background: rgba(74,144,217,0.15); color: var(--blue); border: 1px solid rgba(74,144,217,0.25); }
    .card-obs { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 6px; }

    .empty-state {
      text-align: center; padding: 3rem 2rem;
      background: var(--navy-mid); border: 1px solid var(--border); border-radius: 12px;
    }
    .empty-state i { font-size: 32px; color: var(--muted); opacity: 0.4; margin-bottom: 12px; display: block; }
    .empty-state p { font-size: 13px; color: var(--muted); }

    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--navy-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 20px; font-size: 13px;
      display: flex; align-items: center; gap: 10px; z-index: 400;
      opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
    .toast.ok { border-color: rgba(76,175,130,0.4); color: var(--success); }
    .toast.err { border-color: rgba(226,75,74,0.4); color: #f09595; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="../../img/logo.png" alt="INDECSA" />
    <span class="logo-text">INDECSA</span>
  </div>
  <span class="header-tag">Capital Humano</span>
</header>

<nav>
  <a class="nav-link" href="../Paginaprincipal.html"><i class="fa-solid fa-house"></i> Inicio</a>
  <a class="nav-link" href="../Trabajador/VisualizarTrabajadores.html"><i class="fa-solid fa-user"></i> Trabajadores</a>
  <a class="nav-link" href="../Proyecto/ListaProyectos.html"><i class="fa-solid fa-diagram-project"></i> Proyectos</a>
  <a class="nav-link" href="../Contratista/ListaContratistas.html"><i class="fa-solid fa-people-group"></i> Contratistas</a>
  <a class="nav-link" href="../Relacion/Relacionar.html"><i class="fa-solid fa-link"></i> Relacionar</a>
  <a class="nav-link" href="../RegistroHoras/RegistroHoras.html"><i class="fa-solid fa-clock"></i> Reg. Horas</a>
  <a class="nav-link" href="../PersonalObra/PersonalObra.html"><i class="fa-solid fa-hard-hat"></i> Personal Obra</a>
  <a class="nav-link active" href="AvanceObra.html"><i class="fa-solid fa-chart-line"></i> Avance Obra</a>
  <a class="nav-link" href="../Reportes/Reportes.html"><i class="fa-solid fa-file-pdf"></i> Reportes</a>
  <div class="nav-sep"></div>
  <button class="nav-logout" onclick="cerrarSesion()"><i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión</button>
</nav>

<main>
  <div class="page-header">
    <div class="page-icon"><i class="fa-solid fa-chart-line"></i></div>
    <h1>Avance de Obra</h1>
    <p>Registra y consulta el avance de partidas por proyecto.</p>
  </div>

  <div class="layout">

    <!-- FORM -->
    <div class="form-panel">
      <div class="panel-title"><i class="fa-solid fa-plus"></i> Registrar Avance</div>

      <div class="form-group">
        <label>Proyecto *</label>
        <select id="selProyecto" onchange="onProyecto()">
          <option value="">— Selecciona proyecto —</option>
        </select>
      </div>

      <div class="form-group">
        <label>Cuadrilla</label>
        <select id="selCuadrilla" disabled>
          <option value="">Sin cuadrilla</option>
        </select>
      </div>

      <div class="form-group">
        <label>Nombre de partida *</label>
        <input type="text" id="inpPartida" placeholder="Ej. Excavación, Colado, Mampostería…" />
      </div>

      <div class="row-2">
        <div class="form-group">
          <label>Cantidad ejecutada *</label>
          <input type="number" id="inpEjecutada" min="0.01" step="0.01" placeholder="0.00" />
        </div>
        <div class="form-group">
          <label>Unidad *</label>
          <select id="selUnidad">
            <option value="m2">m²</option>
            <option value="m3">m³</option>
            <option value="ml">ml</option>
            <option value="piezas">piezas</option>
            <option value="porcentaje">%</option>
          </select>
        </div>
      </div>

      <div class="row-2">
        <div class="form-group">
          <label>Cantidad programada</label>
          <input type="number" id="inpProgramada" min="0" step="0.01" placeholder="0.00 (opc.)" />
        </div>
        <div class="form-group">
          <label>Fecha de registro *</label>
          <input type="date" id="inpFecha" />
        </div>
      </div>

      <div class="form-group">
        <label>Observaciones</label>
        <textarea id="inpObs" placeholder="Notas adicionales…"></textarea>
      </div>

      <button class="btn-submit" id="btnSubmit" onclick="registrar()" disabled>
        <i class="fa-solid fa-floppy-disk"></i> Registrar avance
      </button>
    </div>

    <!-- RECORDS -->
    <div class="records-panel">
      <div class="filter-bar">
        <label><i class="fa-solid fa-filter"></i> Filtrar:</label>
        <label>Desde</label>
        <input type="date" id="fDesde" />
        <label>Hasta</label>
        <input type="date" id="fHasta" />
        <button class="btn-filter" onclick="aplicarFiltro()"><i class="fa-solid fa-magnifying-glass"></i> Filtrar</button>
        <button class="btn-clear" onclick="limpiarFiltro()"><i class="fa-solid fa-xmark"></i> Limpiar</button>
      </div>
      <div id="recordsList" class="records-list">
        <div class="empty-state">
          <i class="fa-solid fa-chart-line"></i>
          <p>Selecciona un proyecto para ver los avances registrados</p>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:8080/api/v1';
  let idProyectoActual = null;

  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('inpFecha').value = hoy();
    cargarProyectos();
    initNavHide();
  });

  function hoy() { return new Date().toISOString().slice(0, 10); }

  function initNavHide() {
    let last = window.scrollY;
    window.addEventListener('scroll', () => {
      document.body.classList.toggle('nav-hidden', window.scrollY > last && window.scrollY > 80);
      last = window.scrollY;
    }, { passive: true });
  }

  async function cargarProyectos() {
    try {
      const r = await fetch(`${API}/proyectos`);
      const lista = await r.json();
      const sel = document.getElementById('selProyecto');
      lista.forEach(p => {
        const o = document.createElement('option');
        o.value = p.idProyecto; o.textContent = p.nombre;
        sel.appendChild(o);
      });
    } catch { toast('No se pudieron cargar los proyectos', 'err'); }
  }

  async function onProyecto() {
    const id = document.getElementById('selProyecto').value;
    idProyectoActual = id || null;
    const btnSubmit = document.getElementById('btnSubmit');
    if (!id) {
      resetCuadrillas(); btnSubmit.disabled = true;
      mostrarVacio('Selecciona un proyecto para ver los avances registrados');
      return;
    }
    btnSubmit.disabled = false;
    mostrarSkeletons();
    await Promise.all([cargarCuadrillas(id), cargarAvances(id)]);
  }

  function resetCuadrillas() {
    const sel = document.getElementById('selCuadrilla');
    sel.innerHTML = '<option value="">Sin cuadrilla</option>';
    sel.disabled = true;
  }

  async function cargarCuadrillas(idProy) {
    try {
      const r = await fetch(`${API}/cuadrillas/proyecto/${idProy}`);
      const lista = await r.json();
      const sel = document.getElementById('selCuadrilla');
      sel.innerHTML = '<option value="">Sin cuadrilla</option>';
      lista.forEach(c => {
        const o = document.createElement('option');
        o.value = c.idCuadrilla; o.textContent = c.nombre;
        sel.appendChild(o);
      });
      sel.disabled = false;
    } catch { resetCuadrillas(); }
  }

  async function cargarAvances(idProy, desde, hasta) {
    let url = `${API}/avance-partida/proyecto/${idProy}`;
    const params = new URLSearchParams();
    if (desde) params.set('fechaInicio', desde);
    if (hasta)  params.set('fechaFin', hasta);
    if ([...params].length) url += '?' + params.toString();
    try {
      const r = await fetch(url);
      renderAvances(await r.json());
    } catch {
      toast('Error al cargar avances', 'err');
      mostrarVacio('No se pudieron cargar los avances');
    }
  }

  function renderAvances(lista) {
    if (!lista.length) { mostrarVacio('No hay avances registrados para este proyecto'); return; }
    document.getElementById('recordsList').innerHTML = lista.map(cardHTML).join('');
  }

  function cardHTML(a) {
    const pct = a.cantidadProgramada > 0
      ? Math.min(100, (a.cantidadEjecutada / a.cantidadProgramada) * 100) : null;
    const over = pct !== null && pct >= 100;
    const unidad = a.unidadMedida === 'porcentaje' ? '%' : a.unidadMedida;
    const progHTML = pct !== null ? `
      <div class="prog-wrap">
        <div class="prog-bar-bg"><div class="prog-bar-fill ${over ? 'over' : ''}" style="width:${pct.toFixed(1)}%"></div></div>
        <div class="prog-label">${pct.toFixed(1)}% de ${a.cantidadProgramada} ${unidad} programado</div>
      </div>` : '';
    const cuadrillaChip = a.nombreCuadrilla
      ? `<span class="chip chip-cuadrilla"><i class="fa-solid fa-people-group"></i> ${a.nombreCuadrilla}</span>` : '';
    const obsHTML = a.observaciones
      ? `<div class="card-obs"><i class="fa-solid fa-comment-dots"></i> ${a.observaciones}</div>` : '';
    return `
    <div class="avance-card">
      <div class="card-top">
        <div class="card-partida">${a.nombrePartida}</div>
        <div class="card-date"><i class="fa-regular fa-calendar"></i> ${a.fechaRegistro}</div>
      </div>
      <div class="card-qty">${a.cantidadEjecutada}<span>${unidad}</span></div>
      ${progHTML}
      <div class="card-meta">${cuadrillaChip}</div>
      ${obsHTML}
    </div>`;
  }

  function mostrarSkeletons() {
    document.getElementById('recordsList').innerHTML = [1,2,3].map(() => `
      <div class="sk-card">
        <div class="sk sk-line" style="width:60%"></div>
        <div class="sk sk-line" style="width:40%"></div>
        <div class="sk sk-line" style="width:80%;height:8px;margin-top:10px"></div>
      </div>`).join('');
  }

  function mostrarVacio(msg) {
    document.getElementById('recordsList').innerHTML = `
      <div class="empty-state"><i class="fa-solid fa-chart-line"></i><p>${msg}</p></div>`;
  }

  function aplicarFiltro() {
    if (!idProyectoActual) return;
    mostrarSkeletons();
    cargarAvances(idProyectoActual, document.getElementById('fDesde').value, document.getElementById('fHasta').value);
  }

  function limpiarFiltro() {
    document.getElementById('fDesde').value = '';
    document.getElementById('fHasta').value = '';
    if (idProyectoActual) { mostrarSkeletons(); cargarAvances(idProyectoActual); }
  }

  async function registrar() {
    const idProy    = document.getElementById('selProyecto').value;
    const idCuad    = document.getElementById('selCuadrilla').value || null;
    const partida   = document.getElementById('inpPartida').value.trim();
    const ejecutada = parseFloat(document.getElementById('inpEjecutada').value);
    const unidad    = document.getElementById('selUnidad').value;
    const programada = parseFloat(document.getElementById('inpProgramada').value) || null;
    const fecha     = document.getElementById('inpFecha').value;
    const obs       = document.getElementById('inpObs').value.trim() || null;

    if (!partida) { toast('El nombre de partida es obligatorio', 'err'); return; }
    if (!ejecutada || ejecutada <= 0) { toast('La cantidad ejecutada debe ser mayor a 0', 'err'); return; }
    if (!fecha) { toast('Selecciona la fecha de registro', 'err'); return; }

    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Guardando…';

    try {
      const r = await fetch(`${API}/avance-partida`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          idProyecto: parseInt(idProy),
          idCuadrilla: idCuad ? parseInt(idCuad) : null,
          nombrePartida: partida, fechaRegistro: fecha,
          cantidadEjecutada: ejecutada, unidadMedida: unidad,
          cantidadProgramada: programada, observaciones: obs
        })
      });
      if (!r.ok) throw new Error();
      toast('Avance registrado correctamente', 'ok');
      document.getElementById('inpPartida').value = '';
      document.getElementById('inpEjecutada').value = '';
      document.getElementById('inpProgramada').value = '';
      document.getElementById('inpObs').value = '';
      document.getElementById('inpFecha').value = hoy();
      document.getElementById('selCuadrilla').value = '';
      document.getElementById('selUnidad').value = 'm2';
      mostrarSkeletons();
      await cargarAvances(idProy);
    } catch {
      toast('Error al registrar el avance', 'err');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Registrar avance';
    }
  }

  function toast(msg, tipo) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = `toast show ${tipo}`;
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 3200);
  }

  function cerrarSesion() {
    sessionStorage.removeItem('empleado');
    window.location.href = '../../index.html';
  }
</script>
</body>
</html>
