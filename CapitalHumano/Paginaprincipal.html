<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INDECSA – Panel Cap</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --navy: #0B1F3A; --navy-mid: #152D50; --gold: #C8A96E; --white: #F8F9FC; --text-muted: #8A9BB5; }
    body { font-family: 'DM Sans', sans-serif; background: var(--navy); min-height: 100vh; display: flex; flex-direction: column; }
    header {
      background: var(--navy-mid);
      border-bottom: 1px solid rgba(200,169,110,0.25);
      padding: 0 2rem; height: 72px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo-box {
      width: 180px; height: 48px;
      border: 1.5px dashed rgba(200,169,110,0.5);
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: var(--gold); letter-spacing: 1px; text-transform: uppercase;
    }
    .header-tag { font-size: 11px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; }
    main { flex: 1; background: radial-gradient(ellipse at 60% 40%, #1a2e4a 0%, var(--navy) 65%); }
    footer {
      background: var(--navy-mid);
      border-top: 1px solid rgba(200,169,110,0.15);
      height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem;
    }
    .footer-left { font-size: 12px; color: var(--text-muted); }
    .footer-contact { display: flex; gap: 24px; }
    .footer-contact a { font-size: 12px; color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
    .footer-contact a:hover { color: var(--gold); }
    .footer-contact a i { font-size: 13px; color: var(--gold); }
  </style>
</head>
<body>

<header>
  <img src="../img/logo.png" height="52" alt="INDECSA" />
  <div class="header-tag">Gestión de proyectos &amp; contratistas</div>
</header>

<main></main>

<footer>
  <div class="footer-left">© 2025 INDECSA — Todos los derechos reservados</div>
  <div class="footer-contact">
    <a href="mailto:contacto@indecsa.com"><i class="fa-solid fa-envelope"></i>contacto@indecsa.com</a>
    <a href="tel:+521234567890"><i class="fa-solid fa-phone"></i>+52 123 456 7890</a>
  </div>
</footer>

</body>
</html>
