<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INDECSA – Inicio de sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy: #0B1F3A;
      --navy-mid: #152D50;
      --gold: #C8A96E;
      --gold-light: #E0C890;
      --white: #F8F9FC;
      --text-muted: #8A9BB5;
      --red: #e05555;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--navy); min-height: 100vh; }
    header {
      background: var(--navy-mid);
      border-bottom: 1px solid rgba(200,169,110,0.25);
      padding: 0 2rem;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo-box {
      width: 180px; height: 48px;
      border: 1.5px dashed rgba(200,169,110,0.5);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: var(--gold); letter-spacing: 1px; text-transform: uppercase;
    }
    .header-tag { font-size: 11px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; }
    main {
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 72px - 56px);
      padding: 2rem;
      background: radial-gradient(ellipse at 60% 40%, #1a2e4a 0%, var(--navy) 65%);
    }
    .login-card {
      background: var(--navy-mid);
      border: 1px solid rgba(200,169,110,0.2);
      border-radius: 16px;
      width: 100%; max-width: 420px;
      padding: 2.5rem;
      position: relative; overflow: hidden;
    }
    .login-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .card-header { text-align: center; margin-bottom: 2rem; }
    .card-header h2 { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--white); margin-bottom: 6px; }
    .card-header p { font-size: 13px; color: var(--text-muted); }
    .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 1.75rem; }
    .divider-line { flex: 1; height: 1px; background: rgba(200,169,110,0.2); }
    .divider-icon { color: var(--gold); font-size: 14px; }
    .field { margin-bottom: 1.25rem; }
    .field label { display: block; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
    .field input {
      width: 100%; background: var(--navy);
      border: 1px solid rgba(200,169,110,0.2);
      border-radius: 8px; padding: 12px 16px;
      font-size: 14px; color: var(--white);
      font-family: 'DM Sans', sans-serif;
      outline: none; transition: border-color 0.2s;
    }
    .field input::placeholder { color: var(--text-muted); }
    .field input:focus { border-color: var(--gold); }
    .field input.error { border-color: var(--red); }
    .error-msg { display: none; color: var(--red); font-size: 12px; text-align: center; margin-bottom: 1rem; }
    .error-msg.visible { display: block; }
    .btn-login {
      width: 100%; background: var(--gold); border: none; border-radius: 8px;
      padding: 14px; font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500; color: var(--navy);
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; transition: background 0.2s, transform 0.1s; margin-top: 0.5rem;
    }
    .btn-login:hover { background: var(--gold-light); }
    .btn-login:active { transform: scale(0.98); }
    .card-footer { margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid rgba(255,255,255,0.06); text-align: center; font-size: 12px; color: var(--text-muted); }
    .card-footer span { color: var(--gold); }
    footer {
      background: var(--navy-mid);
      border-top: 1px solid rgba(200,169,110,0.15);
      height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem;
    }
    .footer-left { font-size: 12px; color: var(--text-muted); }
    .footer-contact { display: flex; gap: 24px; }
    .footer-contact a { font-size: 12px; color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
    .footer-contact a:hover { color: var(--gold); }
    .footer-contact a i { font-size: 13px; color: var(--gold); }
  </style>
</head>
<body>

<header>
  <img src="img/logo.png" height="52" alt="INDECSA" />
  <div class="header-tag">Gestión de proyectos &amp; contratistas</div>
</header>

<main>
  <div class="login-card">
    <div class="card-header">
      <h2>Bienvenido</h2>
      <p>Ingresa tus credenciales para continuar</p>
    </div>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-icon">◆</div>
      <div class="divider-line"></div>
    </div>
    <div class="field">
      <label>Usuario</label>
      <input type="text" id="usuario" placeholder="correo@indecsa.com" />
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="contrasena" placeholder="••••••••" />
    </div>
    <div class="error-msg" id="errorMsg">Usuario o contraseña incorrectos</div>
    <button class="btn-login" onclick="iniciarSesion()">Iniciar sesión</button>
    <div class="card-footer">Sistema exclusivo para personal de <span>INDECSA</span></div>
  </div>
</main>

<footer>
  <div class="footer-left">© 2025 INDECSA — Todos los derechos reservados</div>
  <div class="footer-contact">
    <a href="mailto:contacto@indecsa.com"><i class="fa-solid fa-envelope"></i>contacto@indecsa.com</a>
    <a href="tel:+521234567890"><i class="fa-solid fa-phone"></i>+52 123 456 7890</a>
  </div>
</footer>

<script>

  const usuarios = [
    { usuario: 'admin', contrasena: '1234', pagina: 'Admin/Paginaprincipal.html' },
    { usuario: 'cap',   contrasena: '1234', pagina: 'CapitalHumano/Paginaprincipal.html' }
  ];

  function iniciarSesion() {
    const usuario   = document.getElementById('usuario').value.trim();
    const contrasena = document.getElementById('contrasena').value.trim();
    const errorMsg  = document.getElementById('errorMsg');
    const inputU    = document.getElementById('usuario');
    const inputC    = document.getElementById('contrasena');

    const encontrado = usuarios.find(u => u.usuario === usuario && u.contrasena === contrasena);

    if (encontrado) {
      window.location.href = encontrado.pagina;
    } else {
      errorMsg.classList.add('visible');
      inputU.classList.add('error');
      inputC.classList.add('error');
      setTimeout(() => {
        errorMsg.classList.remove('visible');
        inputU.classList.remove('error');
        inputC.classList.remove('error');
      }, 3000);
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') iniciarSesion(); });
</script>

</body>
</html>
